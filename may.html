<h1>5月のブログ</h1>

<h2>5月1日</h2>
昨日は引っ越し。引っ越しの色々な手続きの後、沖縄市市役所にて、転入の手続きをしました。１万円<br>
分の賞品券もらったよ。<br><br>
<h2>5月2日</h2>
今日はちょっとだけ疲れてたけど、ブログを触っていたら気分が明るくなった。<br>
新しいページができて、色がついて、少しずつ形になっていくのを見ると、<br>
なんだか自分の気持ちも整っていく感じがする。<br>
無理せず、できる範囲で続けていこうと思う。<br><br>
